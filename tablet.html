<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Platformer - Admin & Editor</title>
    <style>
        /* ... diğer stiller aynı kalacak ... */
        #adminLogin { position: fixed; top: 10px; left: 10px; z-index: 1000; display: none; }
        #adminPanel {
            position: fixed; top: 0; right: 0; width: 320px; height: 100%;
            background: rgba(0, 0, 0, 0.95); color: white; padding: 20px;
            display: none; z-index: 1001; overflow-y: auto;
            border-left: 3px solid #FFD700; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }
        /* ... */
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <!-- Public Map Generation Button -->
    <button onclick="generateProceduralMap()" style="position: fixed; top: 10px; right: 10px; background: rgba(76, 175, 80, 0.9); color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: sans-serif; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000;">
        ✨ Yeni Harita Oluştur
    </button>

    <!-- Admin Giriş (Display none ile gizlendi, Shift+A ile çalışır) -->
    <div id="adminLogin">
        <button onclick="checkAdmin()">Admin</button>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel">
        <span class="close-admin" onclick="toggleAdminPanel()">×</span>
        <h2 style="color: #FFD700; margin-top: 0;">Harita Editörü</h2>
        <button class="admin-btn" onclick="addNewPlatform()">+ Yeni Platform Ekle</button>
        <div id="platformList"></div>
        <hr style="border: 0; border-top: 1px solid #444; margin: 20px 0;">
        <button class="admin-btn" style="background: #4CAF50; color: white;" onclick="saveMap()">Haritayı Sisteme Kaydet</button>
        <button class="admin-btn" style="background: #f44336; color: white; margin-top: 10px;" onclick="resetMap()">Haritayı Sıfırla</button>
    </div>

    <!-- Mobil Butonlar (PC'de de görünür ama klavye de çalışır) -->
    <div class="controls">
        <div style="display: flex; gap: 20px;">
            <div class="btn" id="leftBtn">←</div>
            <div class="btn" id="rightBtn">→</div>
        </div>
        <div class="btn" id="jumpBtn">Zıpla</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Admin Şifre Kontrolü (Hash: uummuutt12341234)
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function checkAdmin() {
            const passInput = prompt("Yönetici Şifresi:");
            if (!passInput) return;
            const pass = passInput.trim();
            const hashed = await sha256(pass);
            // uummuutt12341234 hash'i: e2e55b38755eb4f231082c97fa9914566f84cbc310d417057ecc42a0581716c1
            if (hashed === "e2e55b38755eb4f231082c97fa9914566f84cbc310d417057ecc42a0581716c1") {
                toggleAdminPanel();
                renderPlatformList();
            } else {
                alert("Erişim Reddedildi!");
            }
        }

        function toggleAdminPanel() {
            const panel = document.getElementById('adminPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        // Oyun Ayarları
        const player = {
            x: 100,
            y: window.innerHeight - 150,
            width: 40,
            height: 40,
            vx: 0,
            vy: 0,
            speed: 6,
            jumpPower: 14,
            grounded: false,
            color: '#FFD700'
        };

        const defaultMap = [
            { x: 0, y: window.innerHeight - 40, width: 5000, height: 40, color: '#4CAF50', isGround: true },
            { x: 200, y: window.innerHeight - 200, width: 200, height: 20, color: '#FF5722' },
            { x: 500, y: window.innerHeight - 350, width: 200, height: 20, color: '#FF5722' },
            { x: 800, y: window.innerHeight - 500, width: 200, height: 20, color: '#FF5722' }
        ];

        let platforms = (() => {
            const saved = localStorage.getItem('savedMap');
            const initialY = window.innerHeight - 40;
            if (saved) {
                const parsed = JSON.parse(saved);
                return parsed.map(p => p.isGround ? { ...p, y: initialY } : p);
            }
            return defaultMap;
        })();

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const ground = platforms.find(p => p.isGround);
            if (ground) ground.y = canvas.height - 40;
        }

        // Editör Mantığı
        function renderPlatformList() {
            const list = document.getElementById('platformList');
            list.innerHTML = '';
            platforms.forEach((p, index) => {
                if (p.isGround) return;
                const item = document.createElement('div');
                item.className = 'platform-item';
                item.innerHTML = `
                    <div style="margin-bottom:8px"><b>Platform #${index}</b> <span onclick="removePlatform(${index})" style="color:#ff4444; float:right; cursor:pointer">Sil</span></div>
                    X: <input type="number" value="${p.x}" oninput="updateP(${index}, 'x', this.value)">
                    Y: <input type="number" value="${p.y}" oninput="updateP(${index}, 'y', this.value)"><br>
                    W: <input type="number" value="${p.width}" oninput="updateP(${index}, 'width', this.value)">
                    H: <input type="number" value="${p.height}" oninput="updateP(${index}, 'height', this.value)">
                `;
                list.appendChild(item);
            });
        }

        function updateP(index, prop, val) { platforms[index][prop] = parseInt(val) || 0; }
        function addNewPlatform() { platforms.push({ x: 100, y: canvas.height/2, width: 150, height: 20, color: '#FF5722' }); renderPlatformList(); }
        function removePlatform(index) { platforms.splice(index, 1); renderPlatformList(); }
        function saveMap() { localStorage.setItem('savedMap', JSON.stringify(platforms)); alert("Harita kaydedildi!"); }
        function resetMap() { if(confirm("Tüm harita sıfırlansın mı?")) { platforms = [...defaultMap]; resize(); renderPlatformList(); localStorage.removeItem('savedMap'); } }

        function generateProceduralMap() {
            const newPlatforms = [
                { x: 0, y: canvas.height - 40, width: 5000, height: 40, color: '#4CAF50', isGround: true }
            ];

            let currentX = 100;
            let currentY = canvas.height - 150;
            const platformCount = 15;

            for (let i = 0; i < platformCount; i++) {
                const jumpX = 120 + Math.random() * 180;
                const jumpY = (Math.random() - 0.5) * 150;
                
                const pWidth = 80 + Math.random() * 120;
                const pHeight = 20;

                currentX += jumpX;
                currentY += jumpY;

                if (currentY < 150) currentY = 250;
                if (currentY > canvas.height - 100) currentY = canvas.height - 250;

                newPlatforms.push({
                    x: Math.round(currentX),
                    y: Math.round(currentY),
                    width: Math.round(pWidth),
                    height: pHeight,
                    color: '#FF5722'
                });
            }
            platforms = newPlatforms;
            if (typeof renderPlatformList === 'function') renderPlatformList();
        }

        // Hareket Mantığı
        const keys = { left: false, right: false, jump: false };
        
        // Klavye Dinleyicileri
        window.addEventListener('keydown', e => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') keys.jump = true;
        });
        window.addEventListener('keyup', e => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') keys.jump = false;
        });

        // Dokunmatik Dinleyicileri
        function setupBtn(id, key) {
            const btn = document.getElementById(id);
            btn.addEventListener('pointerdown', e => { e.preventDefault(); keys[key] = true; });
            btn.addEventListener('pointerup', e => { e.preventDefault(); keys[key] = false; });
            btn.addEventListener('pointerleave', e => { e.preventDefault(); keys[key] = false; });
        }
        setupBtn('leftBtn', 'left'); setupBtn('rightBtn', 'right'); setupBtn('jumpBtn', 'jump');

        function update() {
            player.vy += 0.7;
            if (keys.left) player.vx = -player.speed;
            else if (keys.right) player.vx = player.speed;
            else player.vx *= 0.82;

            if (keys.jump && player.grounded) { player.vy = -player.jumpPower; player.grounded = false; }

            player.x += player.vx;
            player.y += player.vy;

            player.grounded = false;
            platforms.forEach(p => {
                // Zemin platformunu karakterin daima önünde olacak şekilde güncelle
                if (p.isGround) {
                    p.width = Math.max(p.width, player.x + canvas.width * 2);
                }

                if (player.x < p.x + p.width && player.x + player.width > p.x &&
                    player.y < p.y + p.height && player.y + player.height > p.y) {
                    const ox = Math.min(player.x + player.width, p.x + p.width) - Math.max(player.x, p.x);
                    const oy = Math.min(player.y + player.height, p.y + p.height) - Math.max(player.y, p.y);
                    if (ox > oy) {
                        if (player.vy > 0 && player.y < p.y) { player.y = p.y - player.height; player.vy = 0; player.grounded = true; }
                        else if (player.vy < 0 && player.y > p.y) { player.y = p.y + p.height; player.vy = 0; }
                    } else {
                        if (player.vx > 0) player.x = p.x - player.width;
                        else if (player.vx < 0) player.x = p.x + p.width;
                    }
                }
            });

            if (player.x < 0) player.x = 0;
            if (player.y > canvas.height) { player.x = 100; player.y = 100; player.vy = 0; }
        }

        function draw() {
            const cameraX = Math.max(0, player.x - canvas.width / 4);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Sabit Arka Plan (Gradiyent kameradan etkilenmez)
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#0f0c29'); grad.addColorStop(0.5, '#302b63'); grad.addColorStop(1, '#24243e');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-cameraX, 0);

            platforms.forEach(p => {
                ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.width, p.height);
                ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.strokeRect(p.x, p.y, p.width, p.height);
            });

            // Oyuncu Çizimi
            ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath();
            ctx.ellipse(player.x + player.width/2, player.y + player.height + 2, player.width/2, 5, 0, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = player.color; ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = 'white';
            const ex = player.vx > 0.5 ? player.x + 25 : player.vx < -0.5 ? player.x + 5 : player.x + 15;
            ctx.fillRect(ex, player.y + 10, 10, 10);
            ctx.fillStyle = 'black'; ctx.fillRect(ex + (player.vx >= 0 ? 5 : 0), player.y + 12, 5, 5);

            ctx.restore();
        }

        function generateProceduralMap() {
            const lastP = platforms.length > 1 ? platforms[platforms.length - 1] : { x: 100, y: canvas.height - 150, width: 100 };
            
            let currentX = lastP.x + lastP.width;
            let currentY = lastP.y;
            const platformCount = 15;
            const added = [];

            for (let i = 0; i < platformCount; i++) {
                const jumpX = 150 + Math.random() * 200;
                const jumpY = (Math.random() - 0.5) * 180;
                const pWidth = 80 + Math.random() * 120;
                currentX += jumpX;
                currentY += jumpY;
                if (currentY < 150) currentY = 250;
                if (currentY > canvas.height - 100) currentY = canvas.height - 250;
                added.push({ x: Math.round(currentX), y: Math.round(currentY), width: Math.round(pWidth), height: 20, color: '#FF5722' });
            }
            
            platforms = platforms.map(p => p.isGround ? { ...p, width: Math.max(p.width, currentX + 1000) } : p);
            platforms = [...platforms, ...added];
            if (typeof renderPlatformList === 'function') renderPlatformList();
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
        window.addEventListener('resize', resize);
        resize(); gameLoop();
    </script>
</body>
</html>
